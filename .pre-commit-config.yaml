minimum_prek_version: "0.4.1"

default_stages:
  - pre-commit

default_install_hook_types:
  - pre-commit
  - commit-msg
  - pre-push

repos:
  - repo: builtin
    hooks:
      - id: trailing-whitespace
        args:
          - --markdown-linebreak-ext=md
          - --markdown-linebreak-ext=markdown
      - id: end-of-file-fixer
      - id: check-case-conflict
      - id: check-toml
      - id: check-yaml
      - id: mixed-line-ending
        args: ["--fix=lf"]
        exclude: '\.(bat|cmd)$'
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: pretty-format-json
        files: ^(?!.*(^|/)package-lock\.json$).+\.json$

  - repo: meta
    hooks:
      - id: check-hooks-apply
      - id: check-useless-excludes

  - repo: local
    hooks:
      - id: taplo-format
        name: taplo format
        entry: uvx --from taplo==0.9.3 taplo fmt
        language: system
        types_or: [toml]
      - id: taplo-lint
        name: taplo lint
        entry: uvx --from taplo==0.9.3 taplo check
        language: system
        types_or: [toml]
      - id: ruff-format
        name: ruff format check
        entry: uv run --locked ruff format --check
        language: system
        types_or: [python, pyi]
      - id: ruff-check
        name: ruff check
        entry: uv run --locked ruff check
        language: system
        types_or: [python, pyi]
      - id: ty-check
        name: ty check
        entry: uv run --locked ty check
        language: system
        types_or: [python, pyi]
      - id: pytest
        name: pytest
        entry: uv run --locked pytest -q --maxfail=1 -m "not slow"
        language: system
        pass_filenames: false
        stages: [pre-push]
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.16.2
    hooks:
      - id: commitizen
        stages: [commit-msg]
      - id: commitizen-branch
        args: [--rev-range, origin/main..HEAD]
        stages: [pre-push]
  - repo: https://github.com/crate-ci/typos
    rev: v1.47.2
    hooks:
      - id: typos
        args: ["--force-exclude"]
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.9.4
    hooks:
      - id: uv-lock
