name: release-please
on:
  push:
    branches:
      - main

concurrency:
  group: release-please
  cancel-in-progress: true

permissions: {}

env:
  UV_VERSION: "0.9.4"

jobs:
  release-please:
    name: Release Please
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      release_tag: ${{ steps.release.outputs.tag_name }}
    runs-on: ubuntu-latest
    permissions:
      contents: write       # required by release-please to create tags/releases
      pull-requests: write  # required by release-please to open release PRs
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v5  # zizmor: ignore[unpinned-uses]
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json
          target-branch: main

  build:
    name: Build
    needs: release-please
    if: needs.release-please.outputs.release_created
    permissions:
      contents: read   # required for checkout
      actions: read     # required for upload-artifact
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release commit
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.release-please.outputs.release_tag }}
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version-file: "pyproject.toml"

      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Build package
        run: uv build

      - name: Store the distribution packages
        uses: actions/upload-artifact@v7  # zizmor: ignore[unpinned-uses]
        with:
          name: python-package-distributions
          path: dist/

  publish-testpypi:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: testpypi
      url: https://test.pypi.org/p/r2x-core
    permissions:
      contents: read   # required for download-artifact
      id-token: write  # required by pypa/gh-action-pypi-publish for trusted publishing
    steps:
      - name: Download all the dists
        uses: actions/download-artifact@v8  # zizmor: ignore[unpinned-uses]
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish package to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1  # zizmor: ignore[unpinned-uses]
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI
    needs:
      - build
      - publish-testpypi
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/r2x-core
    permissions:
      contents: read   # required for download-artifact
      id-token: write  # required by pypa/gh-action-pypi-publish for trusted publishing
    steps:
      - name: Download all the dists
        uses: actions/download-artifact@v8  # zizmor: ignore[unpinned-uses]
        with:
          name: python-package-distributions
          path: dist/
      - name: Publish distribution to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1  # zizmor: ignore[unpinned-uses]
