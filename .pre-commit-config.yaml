minimum_prek_version: "0.2.0"

default_stages:
  - pre-commit

default_install_hook_types:
  - pre-commit
  - commit-msg
  - pre-push

repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types_or: [python, pyi]

      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix --config=pyproject.toml
        language: system
        types_or: [python, pyi]

      - id: ty-check
        name: ty check
        entry: uv run ty check src/
        language: system
        pass_filenames: false
        files: ^(src/|tests/|pyproject\.toml|uv\.lock)

  - repo: builtin
    hooks:
      - id: trailing-whitespace
        args:
          - --markdown-linebreak-ext=md
          - --markdown-linebreak-ext=markdown

      - id: check-added-large-files
        args: ["--maxkb=1000"]

      - id: end-of-file-fixer

      - id: check-case-conflict
      - id: fix-byte-order-marker

      - id: check-json
      - id: check-toml
      - id: check-yaml

      - id: mixed-line-ending
        args: ["--fix=lf"]

      - id: check-merge-conflict
      - id: detect-private-key

      - id: no-commit-to-branch
        args:
          - --branch
          - main
          - --branch
          - master

  - repo: meta
    hooks:
      - id: check-hooks-apply
      - id: check-useless-excludes

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.16
    hooks:
      - id: uv-lock

  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.16.2
    hooks:
      - id: commitizen
        stages: [commit-msg]
      - id: commitizen-branch
        stages: [pre-push]

  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: v1.25.2
    hooks:
      - id: zizmor
        args: ["--pedantic"]
        files: ^\.github/workflows/.*\.ya?ml$
        stages: [pre-commit]

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint
        stages: [pre-commit]

  - repo: local
    hooks:
      - id: pytest
        name: pytest (quick)
        entry: uv run pytest -q --maxfail=1 --disable-warnings
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
        stages: [pre-push]
