name: Documentation

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - ".github/workflows/docs.yaml"
  pull_request:
    paths:
      - "docs/**"
      - ".github/workflows/docs.yaml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

permissions: {}

jobs:
  build:
    name: Build and deploy docs
    timeout-minutes: 20
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required by peaceiris/actions-gh-pages to push to gh-pages branch
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: "latest"

      - name: Install the project
        run: uv sync --group docs

      - name: Generate docstring coverage badge
        run: uv run docstr-coverage src --badge docs/source/_static

      - name: Build Sphinx documentation
        run: uv run sphinx-build docs/source/ docs/_build/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4  # zizmor: ignore[unpinned-uses]
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        with:
          publish_branch: gh-pages
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/_build/
          force_orphan: true
