name: CI

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/ci.yaml"
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/ci.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  UV_VERSION: "0.9.4"

jobs:
  prek:
    name: Prek hooks (lint/format/spell/type)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version-file: "pyproject.toml"

      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true
          version: ${{ env.UV_VERSION }}

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run prek
        run: uv run prek run --all-files --fail-fast --show-diff-on-failure --color=always

  matrix:
    name: Set Python test matrix
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      python-versions: ${{ steps.set.outputs.versions }}
    steps:
      - name: Determine Python versions
        id: set
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = "push" ]; then
            echo 'versions=["3.11","3.12","3.13","3.14"]' >> "$GITHUB_OUTPUT"
          else
            echo 'versions=["3.12","3.14"]' >> "$GITHUB_OUTPUT"
          fi

  pytest:
    name: Tests ${{ matrix.os }} / py${{ matrix.python }}
    needs: [prek, matrix]
    timeout-minutes: 30
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ${{ fromJSON(needs.matrix.outputs['python-versions']) }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true
          version: ${{ env.UV_VERSION }}

      - name: Set up Python ${{ matrix.python }}
        env:
          PYTHON_VERSION: ${{ matrix.python }}
        run: uv python install "$PYTHON_VERSION"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Running package tests
        run: uv run pytest --cov --cov-report=xml

      - uses: codecov/codecov-action@v6  # zizmor: ignore[unpinned-uses]
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  package:
    name: Package smoke test
    needs: pytest
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Build and install wheel
        run: |
          uv build
          python -m venv pkgtest
          source pkgtest/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          python -c "import r2x_core as m; print(getattr(m, '__version__', 'OK'))"
